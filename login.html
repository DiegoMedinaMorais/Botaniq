<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <img class="logo" src="img/Logo.png" alt="Logo botaniq" />
      <button id="tButton">☀️</button>

      <div id="voltar">
        <a href="index.html">Voltar</a>
      </div>
    </header>
    <section id="login">
      <h1>Login</h1>

      <form id="formLogin" action="submit">
        <input
          type="text"
          placeholder="Digite seu E-mail..."
          class="email"
          name="email"
        />

        <input
          type="password"
          placeholder="Digite seu E-mail..."
          class="senha"
          name="senha"
        />

        <button class="submitButton" type="submit">Entrar</button>
      </form>
      <a href="cadastro.html">Não tem uma conta? Cadastrar-se</a>
    </section>

    <footer>
      <h3>© 2026 Botaniq. Todos os direitos reservados.</h3>
    </footer>

    <script src="js/scripts.js"></script>
  </body>
</html>
