<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <img class="logo" src="img/Logo.png" alt="Logo botaniq" />
      <button onclick="trocarTema()" id="tButton">☀️</button>

      <div id="voltar">
        <a class="voltar" href="index.html">Voltar</a>
      </div>
    </header>

    <section id="cadastro">
      <h1>Cadastro</h1>
      <form id="formCadastro" action="submit">
        <input
          type="text"
          placeholder="Digite seu E-mail..."
          class="email"
          name="email"
        />

        <input
          type="password"
          placeholder="Digite sua senha.."
          class="senha"
          name="senha"
        />

        <input
          type="password"
          placeholder="Confirme sua senha.."
          class="senhaConfirmacao"
          name="senhaConfirmacao"
        />

        <button class="submitButton" type="submit">Cadastrar</button>
      </form>
           <a href="login.html">Já tem uma conta? Fazer login</a>
    </section>

    <footer>
      <h3>© 2026 Botaniq. Todos os direitos reservados.</h3>
    </footer>

    <script src="js/scripts.js"></script>
  </body>
</html>
