<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaliações</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <img class="logo" src="img/Logo.png" alt="Logo botaniq" />
      <button id="tButton">☀️</button>

      <div id="voltar">
        <a href="index.html">Voltar</a>
      </div>
    </header>

    <section id="avaliacoes">
      <h1>Avaliações</h1>
      <form id="formAvaliacoes" action="submit">
        <input
          type="text"
          placeholder="Digite seu E-mail..."
          class="email"
          name="email"
        />

        <input
          type="number"
          placeholder="Digite sua nota..."
          class="nota"
          name="nota"
        />

        <textarea
          placeholder="Escreva sua mensagem..."
          class="mensagem"
          name="mensagem"
        >
        </textarea>

        <button class="submitButton" type="submit">Cadastrar</button>
      </form>
    </section>

    <footer>
      <h3>© 2026 Botaniq. Todos os direitos reservados.</h3>
    </footer>

    <script src="js/scripts.js"></script>
  </body>
</html>
